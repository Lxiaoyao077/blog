<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拾光集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#faf7f2;
  --bg-warm:#f5f0e8;
  --surface:#fdfbf7;
  --text:#3d3629;
  --text-dim:#8a8070;
  --text-muted:#b8ad9a;
  --accent:#c47a3e;
  --accent-soft:#e8d5c0;
  --accent-light:#f5e8d8;
  --tag-bg:#ede4d3;
  --tag-text:#7a6240;
  --border:#e5ddd0;
  --divider:#ece5d8;
  --shadow-sm:0 1px 2px rgba(61,54,41,.06);
  --shadow-md:0 4px 16px rgba(61,54,41,.08);
  --radius:3px;
  --radius-lg:6px;
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1a16;
    --bg-warm:#221e18;
    --surface:#25211b;
    --text:#e8e0d0;
    --text-dim:#9a9080;
    --text-muted:#6b6255;
    --accent:#d48c50;
    --accent-soft:#3d3024;
    --accent-light:#2a221a;
    --tag-bg:#302820;
    --tag-text:#c8a870;
    --border:#353025;
    --divider:#2d2820;
    --shadow-sm:0 1px 2px rgba(0,0,0,.2);
    --shadow-md:0 4px 16px rgba(0,0,0,.3);
  }
}

html{scroll-behavior:smooth;font-size:clamp(16px,1vw+14px,18px)}
body{
  font-family:'Noto Serif SC',Georgia,'Times New Roman',serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
}

/* ====== Layout ====== */
.container{max-width:720px;margin:0 auto;padding:0 clamp(1rem,4vw,2.5rem)}

header{
  padding:clamp(2rem,6vh,4rem) 0 clamp(1.5rem,4vh,3rem);
  border-bottom:1px solid var(--divider);
  margin-bottom:clamp(2rem,5vh,3.5rem);
}

.header-inner{
  display:flex;flex-direction:column;align-items:flex-start;gap:.5rem;
}

.blog-title{
  font-size:clamp(1.8rem,5vw,2.4rem);
  font-weight:600;
  letter-spacing:-.02em;
  line-height:1.2;
  color:var(--text);
  font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;
}

.blog-subtitle{
  font-size:.9rem;
  color:var(--text-dim);
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;
  letter-spacing:.03em;
}

nav{margin-top:1.25rem;display:flex;gap:.25rem;flex-wrap:wrap}
.nav-link{
  background:none;border:none;font-family:inherit;
  font-size:.85rem;color:var(--text-dim);cursor:pointer;
  padding:.35rem .9rem;border-radius:var(--radius);
  transition:color .2s,background .2s;
  letter-spacing:.01em;
}
.nav-link:hover{color:var(--accent);background:var(--accent-light)}
.nav-link.active{color:var(--accent);font-weight:600;background:var(--accent-light)}

/* ====== Article List ====== */
.post-list{display:flex;flex-direction:column;gap:clamp(1.8rem,3vh,2.8rem)}

.post-card{
  padding-bottom:clamp(1.5rem,3vh,2.2rem);
  border-bottom:1px solid var(--divider);
  cursor:pointer;
  transition:opacity .15s;
}
.post-card:active{opacity:.7}
.post-card:last-child{border-bottom:none}

.post-date{
  font-size:.78rem;color:var(--text-muted);
  letter-spacing:.04em;margin-bottom:.3rem;
  font-family:'Cormorant Garamond',Georgia,serif;
}

.post-title{
  font-size:clamp(1.1rem,2.5vw,1.35rem);
  font-weight:600;line-height:1.4;
  margin-bottom:.4rem;color:var(--text);
}

.post-excerpt{
  font-size:.88rem;color:var(--text-dim);
  line-height:1.7;margin-bottom:.7rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}

.post-tags{display:flex;gap:.4rem;flex-wrap:wrap}
.tag{
  display:inline-block;font-size:.72rem;
  padding:.15rem .55rem;border-radius:var(--radius);
  background:var(--tag-bg);color:var(--tag-text);
  letter-spacing:.02em;cursor:pointer;
  transition:background .2s;border:none;font-family:inherit;
}
.tag:hover{background:var(--accent-soft)}
.tag.active{background:var(--accent);color:#fff}

/* ====== Article Detail ====== */
.article-header{margin-bottom:2rem}
.article-title{
  font-size:clamp(1.5rem,4vw,2rem);
  font-weight:700;line-height:1.35;
  margin-bottom:.5rem;
}
.article-meta{
  font-size:.82rem;color:var(--text-muted);
  display:flex;gap:1rem;flex-wrap:wrap;
  align-items:center;
}

.article-body{
  font-size:.95rem;line-height:1.85;
}
.article-body h2{
  font-size:1.25rem;font-weight:600;
  margin:2rem 0 .75rem;color:var(--text);
}
.article-body h3{
  font-size:1.05rem;font-weight:600;
  margin:1.5rem 0 .5rem;color:var(--text);
}
.article-body p{margin-bottom:1rem}
.article-body ul,.article-body ol{margin:.5rem 0 1rem 1.5rem}
.article-body li{margin-bottom:.35rem;padding-left:.3rem}
.article-body blockquote{
  border-left:3px solid var(--accent-soft);
  padding:.5rem 1rem;margin:1.2rem 0;
  color:var(--text-dim);font-style:italic;
  background:var(--bg-warm);border-radius:0 var(--radius) var(--radius) 0;
}
.article-body code{
  font-size:.82em;background:var(--bg-warm);
  padding:.12em .35em;border-radius:2px;
  color:var(--accent);
}
.article-body pre{
  background:var(--bg-warm);padding:1rem 1.2rem;
  border-radius:var(--radius-lg);overflow-x:auto;
  margin:1rem 0;font-size:.82rem;line-height:1.6;
  border:1px solid var(--border);
}
.article-body pre code{background:none;color:var(--text);padding:0}
.article-body a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.article-body hr{border:none;border-top:1px solid var(--divider);margin:2rem 0}
.article-body img{max-width:100%;border-radius:var(--radius-lg);margin:1rem 0}

.back-link{
  display:inline-flex;align-items:center;gap:.3rem;
  font-size:.85rem;color:var(--text-dim);cursor:pointer;
  background:none;border:none;font-family:inherit;
  margin-bottom:1.5rem;padding:.3rem 0;
  transition:color .2s;
}
.back-link:hover{color:var(--accent)}
.back-link svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ====== Tags Page ====== */
.tags-cloud{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:2.5rem}
.tag-cloud-item{
  font-size:.88rem;padding:.4rem 1rem;
  border:1px solid var(--border);border-radius:var(--radius-lg);
  background:var(--surface);color:var(--text-dim);cursor:pointer;
  transition:all .2s;font-family:inherit;
  letter-spacing:.02em;
}
.tag-cloud-item:hover{border-color:var(--accent);color:var(--accent)}
.tag-cloud-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag-cloud-item .count{font-size:.72rem;opacity:.7;margin-left:.3rem}

/* ====== About Page ====== */
.about-section{margin-bottom:2.5rem}
.about-section h2{
  font-size:1.15rem;font-weight:600;margin-bottom:.8rem;
  color:var(--text);letter-spacing:.01em;
}
.about-section p{
  font-size:.9rem;color:var(--text-dim);line-height:1.8;
}
.about-section a{color:var(--accent);text-decoration:underline;text-underline-offset:3px}

/* ====== Empty & Loading ====== */
.empty-state{
  text-align:center;padding:3rem 1rem;color:var(--text-muted);
}
.empty-state p{font-size:.9rem;margin-top:.5rem}

/* ====== Footer ====== */
footer{
  margin-top:clamp(3rem,8vh,5rem);
  padding:2rem 0;border-top:1px solid var(--divider);
  text-align:center;
}
footer p{font-size:.78rem;color:var(--text-muted);letter-spacing:.02em}

/* ====== Animations ====== */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.fade-up{animation:fadeUp .4s ease-out both}
.fade-up:nth-child(1){animation-delay:0s}
.fade-up:nth-child(2){animation-delay:.06s}
.fade-up:nth-child(3){animation-delay:.12s}
.fade-up:nth-child(4){animation-delay:.18s}
.fade-up:nth-child(5){animation-delay:.24s}

@media(prefers-reduced-motion:reduce){
  .fade-up{animation:none;opacity:1}
}
</style>
</head>

<header>
  <div class="header-inner">
    <div class="blog-title">拾光集</div>
    <div class="blog-subtitle">Collecting fragments of light.</div>
  </div>
  <nav id="nav"></nav>
</header>

<main id="main"></main>

<footer><p>拾光集 &copy; 2024 &mdash; 用文字留住时间</p></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
<script>
// ====== DATA ======
const POSTS = [
  {
    id:1,slug:'writing-tools',
    title:'关于写作的工具与习惯',
    date:'2024-12-15',
    excerpt:'从纸笔到数字化，这些年我试过的写作工具和沉淀下来的习惯。',
    tags:['写作','工具'],
    content:`这些年来，写作一直是我思考的方式。不是为了输出观点，而是为了理清自己。

## 纸笔时代

高中时用钢笔在活页本上写日记。墨水洇开的触感，笔尖划过纸面的声音，这些物理反馈让我觉得文字是真实存在于这个世界上的。

后来换成了 Moleskine 和 Lamy Safari。倒不是跟风，只是那支笔握着确实舒服。

## 数字化迁徙

大学开始用 Ulysses。它的纯文本 + Markdown 思路很对——写作者只需要关注内容，排版交给机器。

但 Ulysses 的问题是太「干净」了。干净到让人觉得每一个字都必须是完美的。空白页面焦虑症反而加重了。

后来试了 iA Writer，更极端——连文件夹都不让你看，就给你一张白纸。这反而有用，因为没得选，只能写。

## 现在

现在我回归了最朴素的方式：VS Code + Markdown 文件 + Git 版本管理。

没有花哨的界面，没有"专注模式"的噱头，就是写。写完了 push 到 GitHub，哪里都能看。

重要的从来不是工具，是坐下来写这个动作本身。`},
  {
    id:2,slug:'leaving-big-tech',
    title:'为什么我离开了大厂',
    date:'2024-11-02',
    excerpt:'三年零八个月，我从一个满腔热血的毕业生变成了一个学会沉默的人。',
    tags:['生活','职业'],
    content:`离开的决定做了半年。真正递辞呈只用了五分钟。

## 不是因为累

大厂累是常态，这不是什么新鲜事。我离开不是因为加班——虽然确实加了不少。

也不是因为钱。大厂的薪酬体系在业内是天花板级别的，这个没什么好抱怨的。

## 是因为"做什么"

入职第一年，我写的代码上线了几百万用户在用。那种感觉很好。

第三年，我已经连续三个季度在为一个内部重构项目改参数名。没有人用这个项目，它存在的唯一理由是我的老板需要向他的老板证明我们 Q3 做了事情。

我不怕加班，我怕的是不知道自己在加班做什么。

## 也不是大厂的错

这不是某一家公司的问题。当组织膨胀到一定规模，熵增是不可避免的。每个人都在做看起来"正确"的事情，但合在一起没有任何意义。

我没法改变这个系统，但可以选择不在这个系统里消耗自己。

现在做独立开发，赚得少了很多，但每天早上醒来知道今天要做什么、为什么要做。这就够了。`},
  {
    id:3,slug:'books-2024',
    title:'2024 年读过的十本书',
    date:'2024-12-28',
    excerpt:'今年读了四十几本，选出十本真正改变了我思考方式的。',
    tags:['阅读','年度总结'],
    content:`今年刻意减少了阅读量，从去年的七十多本降到了四十几本。质量明显提高了。

以下十本是对我影响最大的，排名不分先后。

## 非虚构

1. **《纳瓦尔宝典》** — 关于财富和幸福的最简洁论述。重读了第三遍。

2. **《思考，快与慢》** — 终于读完了。卡尼曼在最后一章说，他对人类理性的态度比写这本书时悲观了许多。这本身就是一个值得思考的注脚。

3. **《枪炮、病菌与钢铁》** — 地理决定论的经典。读完最大的感受：我们对自己命运的掌控比想象中小得多。

4. **《深度工作》** — 卡尔·纽波特的书实操性很强。我用他的方法把上午 8 点到 12 点锁死为不可打扰的深度工作时间。

## 文学

5. **《斯通纳》** — 一个普通大学教授的一生。没有英雄主义，没有逆袭。但读完很久都在想他。

6. **《百年孤独》** — 第三次挑战，这次读完了。不是因为更好懂了，是因为更能接受"看不懂"这件事了。

7. **《海边的卡夫卡》** — 村上的书永远给你一种"我也说不清这书讲了什么但我就是很喜欢"的感觉。

8. **《平原上的摩西》** — 双雪涛。东北的雪、工厂的烟、人与人之间说不清道不明的牵扯。

## 技术与设计

9. **《Designing Data-Intensive Applications》** — 做后端必读。不是工具书，是思维框架。

10. **《Refactoring UI》** — 独立开发者必读。作者把美感这件事拆成了可操作的原则，对没有设计背景的工程师极其友好。`},
  {
    id:4,slug:'rebuilding-blog',
    title:'个人博客的重建之旅',
    date:'2024-08-10',
    excerpt:'从 Notion 到 Hugo 再到手写 HTML，一个反复折腾的过程。',
    tags:['技术','博客'],
    content:`这个博客已经重建了四次。

## 第一版：Notion + Super

最省事的方式。在 Notion 里写，Super 渲染成网站。问题是慢，而且我对自己的数据失去了控制——万一 Notion 挂了怎么办？

## 第二版：Hugo + Netlify

静态网站生成器的标准答案。速度快，Markdown 原生支持，Netlify 自动部署。

但 Hugo 的模板语法让我头疼。每次想改一点布局，都要花半小时查文档。

## 第三版：Next.js + Vercel

功能最强大的一版。MDX 支持在 Markdown 里嵌入 React 组件，可以做很多事情。

但我逐渐意识到一个问题：一个个人博客真的需要 React Server Components、ISR 和 Edge Functions 吗？

## 第四版：回到原点

这一版只有一个 HTML 文件。没有框架，没有构建工具，没有 node_modules。

Markdown 用 marked.js 在浏览器端渲染。样式手写 CSS。部署就是把这个文件扔到 GitHub Pages 上。

不是反技术，是回归到博客的本质——文字和读者。其他都是噪音。

而且我发现，限制越少，写的越多。当你知道只需打开一个文件就能发布新文章时，写作的门槛就降到了最低。`},
  {
    id:5,slug:'morning-routine',
    title:'我的晨间日常',
    date:'2024-10-20',
    excerpt:'早上六点到九点，这三个小时决定了这一天。',
    tags:['生活','习惯'],
    content:`过去三年，我一直保持着早上六点起床的习惯。

## 6:00 - 6:30

起床，洗脸，喝一大杯温水。不看手机。

这个"不看手机"是最重要的一条。一旦打开微信或 Twitter，外部的信息洪流就会在起床后的第一分钟冲刷我的大脑，让我失去对自己一天的掌控感。

## 6:30 - 8:00

深度工作时间。写代码、写文章、或者学习新东西。

这两个小时是我一天中注意力最集中、思维最清晰的时候。没有会议、没有消息、没有打断。

我发现一个规律：如果早上这两个小时产出了让自己满意的东西，接下来一整天都会心情很好。反之，如果早上被会议或琐事占用了，整天都会有种隐隐的不安。

## 8:00 - 9:00

早餐 + 轻阅读。通常是麦片、鸡蛋、一杯黑咖啡。

这段时间会看一些长文章或书，但不会看社交媒体。保持输入的深度和节奏感。

## 周末

周末会稍微偷懒，睡到七点。但核心结构不变——不看手机、先做事、再休闲。

这套作息不是自律，是"省力"——当它变成惯性之后，你不再需要每天和懒惰做斗争。身体和大脑在六点自动醒来，就像太阳升起一样自然。`}
];

const TAG_MAP = {};
POSTS.forEach(p => p.tags.forEach(t => {
  if(!TAG_MAP[t]) TAG_MAP[t] = [];
  TAG_MAP[t].push(p);
}));

// ====== STATE ======
let currentView = 'home';
let currentTag = null;
let currentPost = null;

// ====== RENDER ======
function renderNav(){
  const nav = document.getElementById('nav');
  const links = [
    {view:'home',label:'文章'},
    {view:'tags',label:'标签'},
    {view:'about',label:'关于'}
  ];
  nav.innerHTML = links.map(l =>
    `<button class="nav-link${currentView===l.view?' active':''}" onclick="navigate('${l.view}')">${l.label}</button>`
  ).join('');
}

function navigate(view,param){
  currentView = view;
  if(view==='post') currentPost = param;
  else if(view==='tag') currentTag = param;
  else{currentPost=null;currentTag=null}
  renderNav();
  renderMain();
  window.scrollTo({top:0,behavior:'smooth'});
  if(view==='post'||view==='tag') window.location.hash = view+'/'+param;
  else window.location.hash = view;
}

function renderMain(){
  const main = document.getElementById('main');
  switch(currentView){
    case 'home': renderHome(main);break;
    case 'post': renderPost(main);break;
    case 'tags': renderTags(main);break;
    case 'about': renderAbout(main);break;
  }
}

function renderHome(main){
  let posts = POSTS;
  if(currentTag) posts = TAG_MAP[currentTag]||[];
  const tagLabel = currentTag ? `<p style="font-size:.85rem;color:var(--text-dim);margin-bottom:1.5rem">标签：<span style="color:var(--accent);font-weight:600">${currentTag}</span> &middot; ${posts.length} 篇 <button onclick="navigate('home')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.8rem;text-decoration:underline;margin-left:.5rem">清除筛选</button></p>` : '';

  main.innerHTML = tagLabel + '<div class="post-list">' + posts.map((p,i) => `
    <article class="post-card fade-up" onclick="navigate('post','${p.slug}')">
      <div class="post-date">${p.date}</div>
      <h2 class="post-title">${p.title}</h2>
      <p class="post-excerpt">${p.excerpt}</p>
      <div class="post-tags">${p.tags.map(t => `<span class="tag" onclick="event.stopPropagation();navigate('tag','${t}')">${t}</span>`).join('')}</div>
    </article>
  `).join('') + '</div>';
}

function renderPost(main){
  const p = currentPost ? POSTS.find(x=>x.slug===currentPost) : null;
  if(!p){main.innerHTML='<div class="empty-state"><p>文章不存在</p></div>';return}

  const html = marked.parse(p.content);
  main.innerHTML = `
    <button class="back-link" onclick="navigate(currentTag?'tag':'home'${currentTag?',\''+currentTag+'\'':''})">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>返回
    </button>
    <article>
      <header class="article-header">
        <h1 class="article-title">${p.title}</h1>
        <div class="article-meta">
          <span>${p.date}</span>
          <span>${p.tags.map(t=>`<span class="tag" onclick="navigate('tag','${t}')">${t}</span>`).join(' ')}</span>
        </div>
      </header>
      <div class="article-body">${html}</div>
    </article>
  `;
}

function renderTags(main){
  const tags = Object.keys(TAG_MAP).sort((a,b)=>TAG_MAP[b].length-TAG_MAP[a].length);
  main.innerHTML = `
    <div class="tags-cloud">
      ${tags.map(t => `<button class="tag-cloud-item${currentTag===t?' active':''}" onclick="navigate('tag','${t}')">${t}<span class="count">${TAG_MAP[t].length}</span></button>`).join('')}
    </div>
    ${currentTag ? `<div id="tagPosts"></div>` : '<div class="empty-state"><p>选择一个标签查看相关文章</p></div>'}
  `;
  if(currentTag){
    const tp = document.getElementById('tagPosts');
    const posts = TAG_MAP[currentTag]||[];
    tp.innerHTML = '<h2 style="font-size:1rem;font-weight:600;margin-bottom:1rem;color:var(--text)">「'+currentTag+'」下的文章</h2><div class="post-list">' + posts.map((p,i) => `
      <article class="post-card fade-up" onclick="navigate('post','${p.slug}')">
        <div class="post-date">${p.date}</div>
        <h3 class="post-title">${p.title}</h3>
        <p class="post-excerpt">${p.excerpt}</p>
      </article>
    `).join('') + '</div>';
  }
}

function renderAbout(main){
  main.innerHTML = `
    <div class="about-section">
      <h2>关于我</h2>
      <p>一个写代码的、写文章的、喜欢在周末煮咖啡的人。</p>
      <p style="margin-top:.5rem">目前在做一个独立开发者，主要方向是 Web 工具和内容创作。相信好的产品来自于对细节的偏执和对用户时间的尊重。</p>
    </div>
    <div class="about-section">
      <h2>关于这个博客</h2>
      <p>拾光集——收集光阴的碎片。</p>
      <p style="margin-top:.5rem">这里没有广告、没有追踪、没有评论系统。只有一个 HTML 文件、一些 CSS、和几篇我想写的文章。想联系我可以发邮件到 hello@example.com。</p>
    </div>
    <div class="about-section">
      <h2>技术栈</h2>
      <p>手写 HTML + CSS + Vanilla JS，<a href="https://github.com/markedjs/marked" target="_blank" rel="noopener">marked.js</a> 做 Markdown 渲染，托管在 GitHub Pages。</p>
      <p style="margin-top:.5rem">没有框架，没有构建工具。打开就能写，写完就能发。</p>
    </div>
  `;
}

// ====== ROUTING ======
function initRoute(){
  const hash = window.location.hash.slice(1) || 'home';
  const parts = hash.split('/');
  if(parts[0]==='post'&&parts[1]){
    currentView='post';currentPost=parts[1];
  }else if(parts[0]==='tag'&&parts[1]){
    currentView='tag';currentTag=parts[1];
  }else if(parts[0]==='tags'){
    currentView='tags';
  }else if(parts[0]==='about'){
    currentView='about';
  }else{
    currentView='home';
  }
  renderNav();
  renderMain();
}

window.addEventListener('hashchange',initRoute);
initRoute();
</script>
